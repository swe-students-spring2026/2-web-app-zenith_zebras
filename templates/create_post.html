<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create a Post</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/create_post.css') }}">
</head>

<body>
    <main class="app">
        <header class="header">
            <h1 class="page-title">Create a Post</h1>
        </header>

        <form class="form" method="POST" action="{{ url_for('create_post') }}">
            <input class="input input-big" type="text" name="location" id="location" placeholder="Name of Place" value="{{ post.location or '' }}" required>

            <div class="field-with-error">
                <input class="input input-big" type="text" name="googlemaps" id="googlemaps" placeholder="Link to google maps" value="{{ post.googlemaps or '' }}" required>
                {% if googlemaps_error %}
                <p class="field-error">{{ googlemaps_error }}</p>
                {% endif %}
            </div>

            <div class="choice-row">
                <input class="choice" type="radio" name="seating" id="seat_silent" value="Silent Study" {% if post.seating == 'Silent Study' %}checked{% endif %} required>
                <label class="choice-box" for="seat_silent">Silent<br>Study</label>

                <input class="choice" type="radio" name="seating" id="seat_quiet" value="Quiet Pair" {% if post.seating == 'Quiet Pair' %}checked{% endif %} required>
                <label class="choice-box" for="seat_quiet">Quiet<br>Pair</label>

                <input class="choice" type="radio" name="seating" id="seat_group" value="Fit for Group" {% if post.seating == 'Fit for Group' %}checked{% endif %} required>
                <label class="choice-box" for="seat_group">Fit for<br>Group</label>
            </div>

            <!-- Yes/No rows-->
             <div class="yn-grid">
                <div class="yn-label">Wifi-</div>
                <input class="choice" type="radio" name="wifi" id="wifi_yes" value="Yes" {% if post.wifi == 'Yes' %}checked{% endif %} required>
                <label class="choice-box" for="wifi_yes">Yes</label>
                <input class="choice" type="radio" name="wifi" id="wifi_no" value="No" {% if post.wifi == 'No' %}checked{% endif %}>
                <label class="choice-box" for="wifi_no">No</label>

                <div class="yn-label">Outlets-</div>
                <input class="choice" type="radio" name="outlets" id="outlets_yes" value="Yes" {% if post.outlets == 'Yes' %}checked{% endif %} required>
                <label class="choice-box" for="outlets_yes">Yes</label>
                <input class="choice" type="radio" name="outlets" id="outlets_no" value="No" {% if post.outlets == 'No' %}checked{% endif %}>
                <label class="choice-box" for="outlets_no">No</label>

                <div class="yn-label">Reservable-</div>
                <input class="choice" type="radio" name="reservable" id="reservable_yes" value="Yes" {% if post.reservable == 'Yes' %}checked{% endif %} required>
                <label class="choice-box" for="reservable_yes">Yes</label>
                <input class="choice" type="radio" name="reservable" id="reservable_no" value="No" {% if post.reservable == 'No' %}checked{% endif %}>
                <label class="choice-box" for="reservable_no">No</label>
            </div>

            <!-- Hours row with validation error -->
            <div class="hours-grid">
                <div class="hours-label">Hours</div>
                <div class="field-with-error">
                    <input class="input hours-input" type="text" name="hours" placeholder="Open from-Open to (e.g. 9:00-17:00)" value="{{ post.hours or '' }}" required>
                    {% if hours_error %}
                    <p class="field-error">{{ hours_error }}</p>
                    {% endif %}
                </div>
            </div>

            <!-- Climate: single input with preset suggestions; click to pick or type custom -->
            <div class="climate-grid">
                <div class="climate-label">Climate</div>
                <div>
                    <input class="input climate-input" type="text" name="climate" id="climate" list="climate-presets" placeholder="Cool, Comfortable, Warm or type your own" value="{{ post.climate or '' }}" required>
                    <datalist id="climate-presets">
                        {% for opt in climate_options %}
                        <option value="{{ opt }}">
                        {% endfor %}
                    </datalist>
                </div>
            </div>

            <button class="finish" type="submit">Create Post</button>

        </form>
    </main>
</body>
</html>
