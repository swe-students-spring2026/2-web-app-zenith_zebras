<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Study Spot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/delete_post.css') }}">
</head>
<body>
    <main class="app">
        <h1>Delete Study Spot</h1>
        <p>Are you sure you want to delete <strong>{{ post.location }}</strong>? This cannot be undone.</p>

        <form action="{{ url_for('delete_post', post_id=post._id) }}" method="POST">
            <button type="submit">Delete Post</button>
        </form>
        <br>
        <a href="{{ url_for('view_post', post_id=post._id) }}">Cancel</a>
    </main>
</body>
</html>
